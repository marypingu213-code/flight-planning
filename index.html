<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本旅遊航班比價助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        
        /* 機票卡片特殊造型 */
        .ticket-card {
            position: relative;
            background: #fff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }
        .ticket-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        @media (min-width: 768px) {
            .ticket-card { flex-direction: row; }
        }
        
        /* 機票切口與虛線 */
        .ticket-cutout {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #f3f4f6;
            border-radius: 50%;
            z-index: 10;
        }
        .ticket-cutout.top { top: -10px; left: 66.666%; transform: translateX(-50%); border-bottom: 1px solid #e5e7eb; }
        .ticket-cutout.bottom { bottom: -10px; left: 66.666%; transform: translateX(-50%); border-top: 1px solid #e5e7eb; }
        .ticket-cutout.left { left: -10px; top: 60%; transform: translateY(-50%); border-right: 1px solid #e5e7eb; }
        .ticket-cutout.right { right: -10px; top: 60%; transform: translateY(-50%); border-left: 1px solid #e5e7eb; }
        
        .ticket-divider {
            position: absolute;
            border-style: dashed;
            border-color: #e5e7eb;
            z-index: 5;
        }
        @media (min-width: 768px) {
            .ticket-divider { top: 10px; bottom: 10px; left: 66.666%; border-width: 0 0 0 2px; }
        }
        @media (max-width: 767px) {
            .ticket-divider { left: 10px; right: 10px; top: 60%; border-width: 2px 0 0 0; }
        }

        /* 最佳方案徽章動畫 */
        .badge-best {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-12">

    <!-- 頂部導覽列 -->

                            </select>

                                <i class="fa-solid fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>
                </div>

                    </div>
                    <div>

                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 一鍵查價按鈕區塊 -->

            e.preventDefault();

            const airline = document.getElementById('airline').value;
            const departure = document.getElementById('departure').value;
            const arrival = document.getElementById('arrival').value;
            const departureTime = document.getElementById('departureTime').value;
            const arrivalTime = document.getElementById('arrivalTime').value;
            const ticketPrice = parseInt(document.getElementById('ticketPrice').value, 10);

            const transportAirport = currentDirection === 'TW_TO_JP' ? departure : arrival;
            const transport = transportCosts[transportAirport];
            const transportPrice = transport.price;
            const totalPrice = ticketPrice + transportPrice;

            const newFlight = {
                id: Date.now().toString(),
                direction: currentDirection,
                date: date,
                airline: airline,
                departure: departure,
                arrival: arrival,
                departureTime: departureTime,
                arrivalTime: arrivalTime,
                ticketPrice: ticketPrice,
                transportType: transport.type,
                transportPrice: transportPrice,
                totalPrice: totalPrice,
                timestamp: new Date().getTime()
            };

            flights.push(newFlight);
            saveData();
            
            if (isMatchMode) {
                performMatch();
            } else {
                renderResults();
            }

        // --- 表單邏輯 ---

            if (airportName === "桃園") return "桃園國際機場 (TPE)";
            if (airportName === "台中") return "台中國際機場 (RMQ)";
            if (airportName === "台南") return "台南航空站 (TNN)";
            if (airportName === "高雄") return "高雄國際機場 (KHH)";
            return airportName;
        }

        function updateFormOptions() {
            const depSelect = document.getElementById('departure');

            let arrOptionsHTML = `<option value="" disabled ${!selectedArr ? 'selected' : ''}>請選擇抵達機場</option>`;

                    route.airlines.forEach(a => validAirlines.add(a));

        function openExternalSearch(engine) {
            const date = document.getElementById('date').value;
            const departure = document.getElementById('departure').value;
            const arrival = document.getElementById('arrival').value;

            if (!date || !departure || !arrival) {
                showToast("請先選擇出發與抵達地點！", "error");
                return;
            }

            const originStr = currentDirection === 'TW_TO_JP' ? departure : arrival;
            const destStr = currentDirection === 'TW_TO_JP' ? arrival : departure;
            const originIATA = iataCodes[originStr];
            const destIATA = iataCodes[destStr];

            if (!originIATA || !destIATA) {
                showToast("發生錯誤，找不到機場代碼", "error");
                return;
            }

            if (engine === 'google') {
                const url = `https://www.google.com/travel/flights?q=Flights%20to%20${destIATA}%20from%20${originIATA}%20on%20${date}%20oneway`;
                window.open(url, '_blank');
            } else if (engine === 'skyscanner') {
                const d = new Date(date);
                const yy = String(d.getFullYear()).slice(2);
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const yymmdd = `${yy}${mm}${dd}`;
                const url = `https://www.skyscanner.com.tw/transport/flights/${originIATA}/${destIATA}/${yymmdd}/?oym=${yy}${mm}&selectedoday=${dd}`;
                window.open(url, '_blank');
            }
        }

        // --- 智慧行程配對邏輯 ---
        function calculateReturnDate(outDateStr, days) {
            const [y, m, d] = outDateStr.split('-').map(Number);
            const dateObj = new Date(y, m - 1, d);
            dateObj.setDate(dateObj.getDate() + days - 1);
            const yy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            return `${yy}-${mm}-${dd}`;
        }

        function resetMatch() {
            isMatchMode = false;
            document.getElementById('matchMessage').classList.add('hidden');
            renderResults();
        }

        function performMatch() {
            const outDateStr = document.getElementById('matchOutDate').value;
            const days = parseInt(document.getElementById('matchDays').value, 10);
            
            if (!outDateStr || isNaN(days) || days < 1) {
                showToast("請輸入正確的出發日期與天數", "error");
                return;
            }

            isMatchMode = true;
            const retDateStr = calculateReturnDate(outDateStr, days);
            
            const outCandidates = flights.filter(f => f.direction === 'TW_TO_JP' && f.date === outDateStr);
            const retCandidates = flights.filter(f => f.direction === 'JP_TO_TW' && f.date === retDateStr);
            
            const msgEl = document.getElementById('matchMessage');
            const container = document.getElementById('resultsContainer');
            const resultCount = document.getElementById('resultCount');
            
            msgEl.classList.remove('hidden', 'text-green-700', 'text-red-500');

            if (outCandidates.length === 0 || retCandidates.length === 0) {
                let errText = `<i class="fa-solid fa-circle-exclamation mr-1"></i> 找不到配對航班！您目前缺少：<br>`;
                if (outCandidates.length === 0) errText += `<span class="ml-5">• ${outDateStr} 的<b>去程</b>航班</span><br>`;
                if (retCandidates.length === 0) errText += `<span class="ml-5">• ${retDateStr} 的<b>回程</b>航班 (第${days}天)</span><br>`;
                errText += `<span class="ml-5 text-gray-500 text-xs">請先在上方新增對應的航班方案。</span>`;
                
                msgEl.innerHTML = errText;
                msgEl.classList.add('text-red-500');
                container.innerHTML = '';
                resultCount.textContent = '0 個組合';
                return;
            }

            outCandidates.sort((a, b) => a.totalPrice - b.totalPrice);
            retCandidates.sort((a, b) => a.totalPrice - b.totalPrice);
            
            const bestOut = outCandidates[0];
            const bestRet = retCandidates[0];
            const comboTotal = bestOut.totalPrice + bestRet.totalPrice;

            msgEl.innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> 成功為您找到最優組合！去程 ${outDateStr}，回程 ${retDateStr}。`;
            msgEl.classList.add('text-green-700');
            resultCount.textContent = '最佳組合推薦';

            container.innerHTML = `
                <div class="bg-gradient-to-r from-amber-500 to-orange-500 rounded-xl p-5 mb-6 shadow-md text-white flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div>
                        <h3 class="text-xl font-black mb-1 drop-shadow-md"><i class="fa-solid fa-trophy mr-1 text-yellow-200"></i> 智慧最優來回組合</h3>
                        <p class="text-sm text-amber-50 font-medium">
                            <span class="inline-block bg-white/20 px-2 py-0.5 rounded mr-1">去程</span> ${outDateStr} 
                            <i class="fa-solid fa-arrow-right mx-2 text-white/70"></i> 
                            <span class="inline-block bg-white/20 px-2 py-0.5 rounded mr-1">回程</span> ${retDateStr} 
                            <span class="ml-1 opacity-80">(${days}天)</span>
                        </p>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-amber-100 mb-1 font-bold tracking-wider">包含接駁總計花費</div>
                        <div class="text-3xl font-black drop-shadow-md">$${comboTotal.toLocaleString()}</div>
                    </div>
                </div>

                <h4 class="font-bold text-indigo-800 mb-3 border-l-4 border-indigo-500 pl-2">🛫 最優去程推薦 (第1天)</h4>
                ${generateCardHTML(bestOut, true, '最佳去程')}

                <h4 class="font-bold text-teal-800 mb-3 mt-6 border-l-4 border-teal-500 pl-2">🛬 最優回程推薦 (第${days}天)</h4>
                ${generateCardHTML(bestRet, true, '最佳回程')}
                
                <!-- 插入 JR PASS 推薦模塊 -->
                ${generateJRPassHTML(bestOut.arrival, bestRet.departure)}
            `;
            
            const altOut = outCandidates.slice(1);
            const altRet = retCandidates.slice(1);
            
            if(altOut.length > 0 || altRet.length > 0) {
                container.innerHTML += `
                    <div class="mt-8 mb-4 border-t border-gray-200 pt-6">
                        <h4 class="font-bold text-gray-600 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-list text-gray-400"></i> 同日期的其他替代方案
                        </h4>
                    </div>
                `;
                altOut.forEach(f => container.innerHTML += generateCardHTML(f, false, '替代去程'));
                altRet.forEach(f => container.innerHTML += generateCardHTML(f, false, '替代回程'));
            }
        }

        // --- 渲染與儲存 ---
        function generateCardHTML(flight, isBest = false, customBadgeText = null) {
            const config = airlineConfig[flight.airline] || airlineConfig["其他"];
            const flightDir = flight.direction || 'TW_TO_JP';
            
            const directionBadge = flightDir === 'TW_TO_JP' 
                ? `<span class="bg-indigo-50 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded font-bold border border-indigo-200">去程</span>`
                : `<span class="bg-teal-50 text-teal-700 text-[10px] px-1.5 py-0.5 rounded font-bold border border-teal-200">回程</span>`;

            const timeStr = calculateDuration(flight.departureTime, flight.arrivalTime);
            const badgeText = customBadgeText || "最佳總價方案";

            return `
                <div class="ticket-card ${isBest ? 'ring-2 ring-amber-400' : 'border border-gray-200'}">
                    <div class="ticket-cutout left md:hidden"></div>
                    <div class="ticket-cutout right md:hidden"></div>
                    <div class="ticket-divider md:hidden"></div>
                    <div class="ticket-cutout top hidden md:block"></div>
                    <div class="ticket-cutout bottom hidden md:block"></div>
                    <div class="ticket-divider hidden md:block"></div>

                    <div class="p-5 md:w-2/3 bg-white flex flex-col justify-between">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium border ${config.badge}">
                                        <i class="fa-solid ${config.icon}"></i> ${flight.airline}
                                    </span>
                                    ${directionBadge}
                                </div>
                                <div class="text-sm text-gray-500 font-medium"><i class="fa-regular fa-calendar mr-1"></i> ${flight.date}</div>
                            </div>
                            
                            ${isBest ? `
                            <div class="badge-best px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm">
                                <i class="fa-solid fa-crown text-yellow-200"></i> ${badgeText}
                            </div>
                            ` : ''}
                            
                            <button onclick="deleteFlight('${flight.id}')" class="text-gray-400 hover:text-red-500 transition-colors p-1 ml-2" title="刪除此方案">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>

                        <div class="flex items-center justify-between text-center relative px-2">
                            <div class="flex-1">
                                <div class="text-2xl font-black text-gray-800">${flight.departureTime}</div>
                                <div class="text-sm font-bold text-gray-500 mt-1">${flight.departure}</div>
                            </div>
                            
                            <div class="flex-1 px-4 flex flex-col items-center">
                                <div class="text-xs text-gray-400 mb-1 border-b border-gray-200 pb-1 w-full">${timeStr}</div>
                                <i class="fa-solid fa-plane text-gray-300 text-lg"></i>
                            </div>

                            <div class="flex-1">
                                <div class="text-2xl font-black text-gray-800">${flight.arrivalTime}</div>
                                <div class="text-sm font-bold text-gray-500 mt-1">${flight.arrival}</div>
                            </div>
                        </div>
                    </div>

                    <div class="p-5 md:w-1/3 bg-gray-50 flex flex-col justify-center border-t md:border-t-0 md:border-l border-gray-100">
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between text-sm text-gray-600">
                                <span>機票費用</span>
                                <span>$${flight.ticketPrice.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between text-sm text-gray-600">
                                <span>${flight.transportType}接駁</span>
                                <span>${flight.transportPrice === 0 ? '無' : '+$' + flight.transportPrice.toLocaleString()}</span>
                            </div>
                        </div>
                        
                        <div class="pt-3 border-t border-gray-200 border-dashed">
                            <div class="text-xs text-gray-500 mb-1 text-right">總計單程花費 (TWD)</div>
                            <div class="text-2xl font-black text-right ${isBest ? 'text-amber-600' : 'text-indigo-600'}">
                                $${flight.totalPrice.toLocaleString()}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            if (isMatchMode) return;

            const container = document.getElementById('resultsContainer');
            const emptyState = document.getElementById('emptyState');
            const resultCount = document.getElementById('resultCount');
            
            resultCount.textContent = `共 ${flights.length} 筆單程`;

            if (flights.length === 0) {
                container.innerHTML = '';
                container.appendChild(emptyState);
                emptyState.classList.remove('hidden');
                return;
            }

            flights.sort((a, b) => a.totalPrice - b.totalPrice);
            container.innerHTML = '';
            
            flights.forEach((flight, index) => {
                container.innerHTML += generateCardHTML(flight, index === 0);
            });
        }

        // --- 輔助函式 ---
        function calculateDuration(start, end) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            let diffMins = (eh * 60 + em) - (sh * 60 + sm);
            if (diffMins < 0) diffMins += 24 * 60; // 跨日
            const h = Math.floor(diffMins / 60);
            const m = diffMins % 60;
            return `${h}h ${m}m`;
        }

        function deleteFlight(id) {
            flights = flights.filter(f => f.id !== id);
            saveData();
            if (isMatchMode) {
                performMatch();
            } else {
                renderResults();
            }
            showToast("方案已刪除", "success");
        }

        function saveData() {
            localStorage.setItem('flightData', JSON.stringify(flights));
        }

        function loadData() {
            const saved = localStorage.getItem('flightData');
            if (saved) {
                flights = JSON.parse(saved);
                renderResults();
            }
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMsg');
            const icon = document.getElementById('toastIcon');
            
            msg.textContent = message;
            if (type === "error") {
                icon.className = "fa-solid fa-circle-exclamation text-red-400";
            } else {
                icon.className = "fa-solid fa-check-circle text-green-400";
            }
            
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        }
    </script>
</body>
</html>
