<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本旅遊航班比價助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        
        /* 機票卡片特殊造型 (保留設計，供未來卡片化使用) */
        .ticket-card {
            position: relative;
            background: #fff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }
        .ticket-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        @media (min-width: 768px) { .ticket-card { flex-direction: row; } }
        
        /* 機票切口與虛線 */
        .ticket-cutout { position: absolute; width: 20px; height: 20px; background-color: #f3f4f6; border-radius: 50%; z-index: 10; }
        .ticket-cutout.top { top: -10px; left: 66.666%; transform: translateX(-50%); border-bottom: 1px solid #e5e7eb; }
        .ticket-cutout.bottom { bottom: -10px; left: 66.666%; transform: translateX(-50%); border-top: 1px solid #e5e7eb; }
        .ticket-cutout.left { left: -10px; top: 60%; transform: translateY(-50%); border-right: 1px solid #e5e7eb; }
        .ticket-cutout.right { right: -10px; top: 60%; transform: translateY(-50%); border-left: 1px solid #e5e7eb; }
        
        .ticket-divider { position: absolute; border-style: dashed; border-color: #e5e7eb; z-index: 5; }
        @media (min-width: 768px) { .ticket-divider { top: 10px; bottom: 10px; left: 66.666%; border-width: 0 0 0 2px; } }
        @media (max-width: 767px) { .ticket-divider { left: 10px; right: 10px; top: 60%; border-width: 2px 0 0 0; } }

        .badge-best { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-12">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="w-full px-4 sm:px-8 xl:px-16 py-3 flex items-center justify-between">
            <div class="flex items-center">
                <i class="fa-solid fa-plane-departure text-xl mr-2"></i>
                <h1 class="text-xl font-bold tracking-wide">日本旅遊機票比價助手</h1>
            </div>
            <button onclick="clearAllData()" class="text-xs bg-indigo-700 hover:bg-red-600 px-3 py-1.5 rounded-lg transition-colors font-medium">
                <i class="fa-solid fa-trash-can mr-1"></i> 清空全部資料
            </button>
        </div>
    </nav>

    <div class="w-full px-4 sm:px-8 xl:px-16 py-6 mt-4">
        
        <div class="space-y-6">
            
            <div class="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl shadow-sm text-white p-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                    <div>
                        <h2 class="text-xl font-black flex items-center gap-2">
                            <i class="fa-solid fa-file-excel text-yellow-300"></i> Excel 檔案自動辨識與帶入
                        </h2>
                        <p class="text-xs text-emerald-100 mt-1">您可以將多筆航班資訊整理在 Excel 中一次匯入，系統會自動為您處理與計算。</p>
                    </div>
                    <button onclick="downloadExcelTemplate()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-3 rounded-lg border border-white/30 transition-all flex items-center gap-1.5 self-stretch md:self-auto justify-center">
                        <i class="fa-solid fa-download"></i> 下載專用 Excel 範本
                    </button>
                </div>
                
                <div class="border-2 border-dashed border-white/40 rounded-xl p-4 text-center hover:border-white/80 transition-colors bg-white/5 relative group">
                    <input type="file" id="excelInput" accept=".xlsx, .xls" onchange="importExcel(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                    <div class="flex flex-col items-center justify-center pointer-events-none py-2">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-emerald-200 mb-2 group-hover:scale-110 transition-transform"></i>
                        <p class="text-sm font-bold">點擊此處 或 將填好的 Excel 檔案拖曳至此</p>
                        <p class="text-[11px] text-emerald-100/70 mt-1">支援 .xlsx, .xls 格式，上傳後將直接滿版顯示於下方</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-base font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-keyboard text-indigo-500"></i>
                    手動單筆新增方案
                </h2>
                
                <form id="flightForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1.5">航線方向</label>
                        <div class="flex bg-gray-100 p-1 rounded-lg">
                            <button type="button" id="btnTwToJp" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-indigo-700 transition-all" onclick="setDirection('TW_TO_JP')">
                                <i class="fa-solid fa-plane-departure mr-1"></i> 台灣出發
                            </button>
                            <button type="button" id="btnJpToTw" class="flex-1 py-1.5 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all" onclick="setDirection('JP_TO_TW')">
                                <i class="fa-solid fa-plane-arrival mr-1"></i> 日本出發
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="date" class="block text-xs font-medium text-gray-700 mb-1">日期</label>
                            <input type="date" id="date" required class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                        </div>
                        <div>
                            <label id="labelDeparture" for="departure" class="block text-xs font-medium text-gray-700 mb-1">出發地點 (台灣)</label>
                            <div class="relative">
                                <select id="departure" required onchange="updateFormOptions()" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                                    <option value="" disabled selected>請選擇出發</option>
                                    <option value="TPE">台北桃園 (TPE)</option>
                                    <option value="KHH">高雄小港 (KHH)</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"><i class="fa-solid fa-chevron-down text-xs"></i></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label id="labelArrival" for="arrival" class="block text-xs font-medium text-gray-700 mb-1">抵達地點 (日本)</label>
                            <div class="relative">
                                <select id="arrival" required disabled onchange="updateFormOptions()" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-100 disabled:opacity-70">
                                    <option value="" disabled selected>請先選擇出發地點</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"><i class="fa-solid fa-chevron-down text-xs"></i></div>
                            </div>
                        </div>
                        <div>
                            <label for="airline" class="block text-xs font-medium text-gray-700 mb-1">航空公司</label>
                            <div class="relative">
                                <select id="airline" required disabled class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-100 disabled:opacity-70">
                                    <option value="" disabled selected>請先選擇地點</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"><i class="fa-solid fa-chevron-down text-xs"></i></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-2 bg-indigo-50/70 rounded-lg p-3 flex flex-col sm:flex-row items-center justify-between border border-indigo-100 text-xs">
                        <div class="text-indigo-800 mb-2 sm:mb-0 flex items-center font-medium">
                            <i class="fa-solid fa-arrow-up-right-from-square text-indigo-500 mr-2"></i> 選好日期與地點，即可一鍵查詢
                        </div>
                    </div>
                </form>
            </div>

            <div id="resultContainer" class="mt-8 w-full">
                </div>

        </div>
    </div>

    <script>
        // 處理 Excel 檔案上傳
        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 🔥 關鍵修正：加上 { raw: false }，讓 Excel 的日期和時間直接以看到的文字輸出，不再出現奇怪的流水號與小數點！
                    const excelData = XLSX.utils.sheet_to_json(worksheet, { raw: false });
                    
                    if(excelData.length === 0) {
                        alert("Excel 裡面沒有資料喔！");
                        return;
                    }

                    renderDataToScreen(excelData);
                    
                } catch (error) {
                    console.error("解析 Excel 時發生錯誤：", error);
                    alert("檔案讀取失敗，請確認上傳的是正確的 Excel 格式 (.xlsx 或 .xls)");
                } finally {
                    event.target.value = '';
                }
            };

            reader.readAsArrayBuffer(file);
        }

        // 負責把資料變成「滿版表格」顯示在網頁上
        function renderDataToScreen(data) {
            const container = document.getElementById('resultContainer');
            const headers = Object.keys(data[0]);
            
            // w-full 確保表格撐滿外層
            let htmlString = `
                <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-indigo-500"></i> 讀取結果 (${data.length} 筆)
                </h2>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden w-full">
                    <div class="overflow-x-auto w-full">
                        <table class="w-full text-sm text-left whitespace-nowrap">
                            <thead class="text-xs text-gray-700 bg-gray-100 border-b">
                                <tr>
            `;
            
            headers.forEach(header => {
                htmlString += `<th class="px-6 py-3.5 font-bold">${header}</th>`;
            });
            htmlString += `</tr></thead><tbody>`;

            data.forEach(row => {
                htmlString += `<tr class="border-b hover:bg-gray-50 transition-colors">`;
                headers.forEach(header => {
                    const cellValue = row[header] !== undefined ? row[header] : '';
                    htmlString += `<td class="px-6 py-4 text-gray-600">${cellValue}</td>`;
                });
                htmlString += `</tr>`;
            });

            htmlString += `</tbody></table></div></div>`;
            container.innerHTML = htmlString;
        }

        // 清空資料
        function clearAllData() {
            if(confirm("確定要清空所有資料嗎？")) {
                document.getElementById('resultContainer').innerHTML = '';
            }
        }

        function downloadExcelTemplate() {
            alert("這裡未來會寫入下載 Excel 範本的邏輯！");
        }

        function updateFormOptions() {
            // 解鎖下一步的下拉選單邏輯
            const departure = document.getElementById('departure').value;
            const arrival = document.getElementById('arrival');
            const airline = document.getElementById('airline');
            
            if (departure) {
                arrival.disabled = false;
                arrival.className = "w-full px-3 py-2 text-sm border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white";
                
                // 動態加點選項做測試
                arrival.innerHTML = `
                    <option value="" disabled selected>請選擇抵達地點</option>
                    <option value="NRT">東京成田 (NRT)</option>
                    <option value="KIX">大阪關西 (KIX)</option>
                    <option value="CTS">札幌新千歲 (CTS)</option>
                `;
                airline.disabled = false;
                airline.className = "w-full px-3 py-2 text-sm border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white";
                airline.innerHTML = `
                    <option value="" disabled selected>請選擇航空公司</option>
                    <option value="BR">長榮航空</option>
                    <option value="CI">中華航空</option>
                    <option value="JX">星宇航空</option>
                    <option value="IT">台灣虎航</option>
                `;
            }
        }

        // 切換「台灣出發」與「日本出發」的 UI 邏輯
        function setDirection(direction) {
            const btnTwToJp = document.getElementById('btnTwToJp');
            const btnJpToTw = document.getElementById('btnJpToTw');
            const labelDeparture = document.getElementById('labelDeparture');
            const labelArrival = document.getElementById('labelArrival');

            if (direction === 'TW_TO_JP') {
                btnTwToJp.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-indigo-700 transition-all";
                btnJpToTw.className = "flex-1 py-1.5 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all";
                labelDeparture.innerText = "出發地點 (台灣)";
                labelArrival.innerText = "抵達地點 (日本)";
            } else {
                btnJpToTw.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-indigo-700 transition-all";
                btnTwToJp.className = "flex-1 py-1.5 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all";
                labelDeparture.innerText = "出發地點 (日本)";
                labelArrival.innerText = "抵達地點 (台灣)";
            }
        }
    </script>
</body>
</html>
